name: Build and push Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and push ${{ matrix.addon.name }}

    strategy:
      matrix:
        addon:
          - name: snmp-ups-sim
            image: rafal83/snmp-ups-sim
            platforms: linux/amd64,linux/arm64,linux/arm/v7
          - name: ttlock-hass-integration
            image: rafal83/ttlock-hass-integration
            platforms: linux/amd64,linux/arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from config.json
        id: version
        run: |
          VERSION=$(jq -r .version ${{ matrix.addon.name }}/config.json)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.addon.name }}
          file: ./${{ matrix.addon.name }}/Dockerfile
          platforms: ${{ matrix.addon.platforms }}
          push: true
          tags: |
            ${{ matrix.addon.image }}:latest
            ${{ matrix.addon.image }}:${{ steps.version.outputs.VERSION }}
